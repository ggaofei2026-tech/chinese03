<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b6e6a">
  <meta name="description" content="中国語入門① 第1課「今天星期一」発音・単語・本文練習。ゼロから学べる日本語対応サイト。">
  <title>第1課 今天星期一｜中国語入門①</title>
    <link rel="stylesheet" href="../shared/site.css">
  <link rel="stylesheet" href="styles.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <script src="vendor/pinyin-pro.js" defer></script>
  <script src="data.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body class="page-lesson">
  <a class="skip-link" href="#main">本文へスキップ</a>
  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-brand" href="../index.html">
        <span class="site-brand__mark">中</span>
        <span class="site-brand__text">中国語入門<small>BEGINNER COURSE</small></span>
      </a>
      <nav class="site-nav" aria-label="メインメニュー">
        <a href="../index.html">ホーム</a>
        <a class="is-active" href="./index.html">第1課</a>
      </nav>
    </div>
  </header>

  <header class="hero hero--compact">
    <div class="wrap hero__inner">
      <h1><span class="hero__no">第1課</span>今天星期一</h1>
      <span id="status-text" class="sr-only" aria-live="polite">準備OK</span>
    </div>
  </header>

  <nav class="step-nav wrap" aria-label="学習ステップ">
    <a href="#words"><b>01</b>単語</a>
    <a href="#sentences"><b>02</b>本文</a>
  </nav>

  <div class="playback-status wrap" id="playback-status" data-state="idle" role="status" aria-live="polite" aria-atomic="true">
    <span class="playback-status__dot" aria-hidden="true"></span>
    <span class="playback-status__text" id="playback-status-text">準備OK。単語カードをタップして始めましょう。</span>
    <button class="btn btn--stop playback-status__stop" id="btn-stop-status" data-stop-playback type="button" disabled>■ 停止</button>
  </div>

  <main id="main" class="wrap">
    <!-- 01 単語 -->
    <section id="words" class="section">
      <header class="section__head">
        <span class="badge">01</span>
        <div>
          <p class="kicker">WORDS</p>
          <h2>新しい単語を覚える</h2>
          <p class="lead">カードをタップして音声を聴き、自分でも言ってみましょう。遅い速度から始めるのがおすすめです。</p>
        </div>
      </header>

      <div class="toolbar">
        <label>再生速度
          <select id="speed-words">
            <option value="0.7">0.7× ゆっくり</option>
            <option value="0.85">0.85×</option>
            <option value="1" selected>1.0×</option>
            <option value="1.15">1.15×</option>
          </select>
        </label>
        <div class="toggle-group" role="group" aria-label="表示切替">
          <button type="button" class="is-on" aria-pressed="true" data-toggle="py" data-target="words">ピンインON</button>
          <button type="button" class="is-on" aria-pressed="true" data-toggle="ja" data-target="words">日本語ON</button>
        </div>
        <div class="playback-actions" aria-label="単語の再生操作">
          <button class="btn btn--teal" id="btn-play-all-words" type="button">▶ 単語を順に全部</button>
          <button class="btn btn--stop" id="btn-stop-global" data-stop-playback type="button" disabled>■ 停止</button>
        </div>
      </div>

      <div class="word-grid" id="word-grid"></div>
    </section>

    <!-- 02 本文 -->
    <section id="sentences" class="section">
      <header class="section__head">
        <span class="badge">02</span>
        <div>
          <p class="kicker">TEXT</p>
          <h2>本文を一文ずつ練習</h2>
          <p class="lead">各漢字の真上にピンインが1対1で表示されます。再生すると、いまの<strong>単語</strong>がオレンジで光ります。何度でも聴き直せます。</p>
        </div>
      </header>

      <div class="toolbar">
        <label>再生速度
          <select id="speed-sents">
            <option value="0.7">0.7× ゆっくり</option>
            <option value="0.85">0.85×</option>
            <option value="1" selected>1.0×</option>
            <option value="1.15">1.15×</option>
          </select>
        </label>
        <div class="toggle-group" role="group" aria-label="表示切替">
          <button type="button" class="is-on" aria-pressed="true" data-toggle="py" data-target="sents">ピンインON</button>
          <button type="button" class="is-on" aria-pressed="true" data-toggle="ja" data-target="sents">日本語ON</button>
        </div>
        <div class="playback-actions" aria-label="本文の連続再生操作">
          <button class="btn btn--teal" id="btn-play-all-sents" type="button">▶ 本文を順に全部</button>
          <button class="btn btn--stop" id="btn-stop-sents" data-stop-playback type="button" disabled>■ 停止</button>
        </div>
      </div>

      <div class="sentence-layout">
        <aside class="sent-list" id="sent-list" aria-label="本文一覧"></aside>
        <article class="sent-stage" id="sent-stage">
          <div class="stage-top">
            <span id="sent-no">01</span>
            <div class="stage-actions stage-actions--sticky">
              <button class="btn btn--teal" id="btn-sent-play" type="button">▶ 聴く</button>
              <button class="btn btn--stop" id="btn-sent-stop" data-stop-playback type="button" disabled>■ 停止</button>
            </div>
          </div>
          <p class="sent-py" id="sent-py"></p>
          <div class="sent-zh" id="sent-zh" lang="zh-CN"></div>
          <p class="sent-ja" id="sent-ja"></p>
          <div class="now-word" id="now-word" aria-live="polite">再生すると、いまの単語がここに出ます。</div>
        </article>
      </div>
    </section>

  </main>

  <footer class="site-footer">中国語入門 · 第1課《今天星期一》</footer>

  <nav class="mobile-dock" aria-label="スマホ用クイックナビ">
    <div class="mobile-dock__inner">
      <a href="#words" data-dock="words"><span class="ico">字</span><span>単語</span></a>
      <a href="#sentences" data-dock="sentences"><span class="ico">文</span><span>本文</span></a>
      <a href="../index.html"><span class="ico">⌂</span><span>ホーム</span></a>
    </div>
  </nav>

  <audio id="player" preload="metadata" playsinline></audio>
</body>
</html>
